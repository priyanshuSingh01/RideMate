<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Passenger Account</title>
    <link rel="stylesheet" href="../css/passenger-signup.css">
</head>
<body>
    
    
    <div class="container">
        <h1>Create Passenger Account</h1>
        <p>Sign up to find and book your rides</p>
    
        <form>
            <div class="input-box">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>
    
            <div class="input-box">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
    
            <div class="input-box">
                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number" required>
            </div>
    
            <div class="input-box">
                <label>Password</label>
                <input type="password" placeholder="Create a password" required>
            </div>
    
            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password" required>
            </div>
    
            <button type="submit">Create Account</button>
            <p class="sign_in">Already have an account? <a href="../html/passenger_login.html">sign in</a></p>
    
        </form>
    
    </div>
    
</body>
</html>
